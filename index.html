<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --bg-subtle: #111111;
    --text: #e8e4de;
    --text-muted: #8a8478;
    --accent: #c9a84c;
    --accent-dim: rgba(201, 168, 76, 0.15);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 3rem 1.5rem;
    line-height: 1.7;
    position: relative;
    overflow-x: hidden;
  }

  /* subtle grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 640px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  /* Language toggle */
  .lang-toggle {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    display: flex;
    gap: 0;
    border: 1px solid rgba(201, 168, 76, 0.25);
    border-radius: 4px;
    overflow: hidden;
    z-index: 10;
    font-family: var(--sans);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .lang-btn {
    background: transparent;
    color: var(--text-muted);
    border: none;
    padding: 0.45rem 0.75rem;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
  }

  .lang-btn.active {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .lang-btn:hover:not(.active) {
    color: var(--text);
  }

  /* Decorative line */
  .rule {
    width: 48px;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
    margin: 2rem 0;
  }

  /* Header */
  h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(2.2rem, 5vw, 3rem);
    letter-spacing: -0.01em;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 0.25rem;
  }

  .subtitle {
    font-family: var(--sans);
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 400;
    margin-bottom: 0.15rem;
  }

  .affiliation {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }

  /* Bio */
  .bio {
    font-size: 0.95rem;
    color: var(--text);
    opacity: 0.85;
    line-height: 1.8;
  }

  .bio + .bio {
    margin-top: 1rem;
  }

  /* Research section */
  .section-label {
    font-family: var(--sans);
    font-size: 0.65rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  .research-statement {
    font-family: var(--serif);
    font-size: 1.15rem;
    font-style: italic;
    font-weight: 300;
    color: var(--text);
    opacity: 0.9;
    line-height: 1.7;
    border-left: 2px solid var(--accent);
    padding-left: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .focus-areas {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .tag {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 0.35rem 0.75rem;
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 2px;
    color: var(--text-muted);
    transition: all 0.3s ease;
  }

  .tag:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Links */
  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 1.2rem;
  }

  .links a {
    font-size: 0.82rem;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.3s ease;
    letter-spacing: 0.02em;
  }

  .links a:hover {
    color: var(--accent);
  }

  /* Footer */
  .footer {
    font-size: 0.75rem;
    color: var(--text-muted);
    opacity: 0.5;
    margin-top: 3rem;
  }

  /* Fade-in */
  .fade {
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.8s ease forwards;
  }
  .fade:nth-child(2) { animation-delay: 0.1s; }
  .fade:nth-child(3) { animation-delay: 0.15s; }
  .fade:nth-child(4) { animation-delay: 0.2s; }
  .fade:nth-child(5) { animation-delay: 0.25s; }
  .fade:nth-child(6) { animation-delay: 0.3s; }
  .fade:nth-child(7) { animation-delay: 0.35s; }
  .fade:nth-child(8) { animation-delay: 0.4s; }
  .fade:nth-child(9) { animation-delay: 0.45s; }
  .fade:nth-child(10) { animation-delay: 0.5s; }
  .fade:nth-child(11) { animation-delay: 0.55s; }
  .fade:nth-child(12) { animation-delay: 0.6s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    body { padding: 4rem 1.25rem 2rem; }
    .lang-toggle { top: 1rem; right: 1rem; }
  }
</style>
</head>
<body>

<div class="lang-toggle">
  <button class="lang-btn active" onclick="setLang('tr')" id="btn-tr">TR</button>
  <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
</div>

<div class="container">

  <div class="fade">
    <p class="subtitle" data-tr="İç Hastalıkları Uzmanı" data-en="Internal Medicine Specialist"></p>
    <h1>Birkan Alaycı</h1>
    <p class="affiliation" data-tr="Liv Hospital Vadi İstanbul" data-en="Liv Hospital Vadi İstanbul"></p>
  </div>

  <div class="rule fade"></div>

  <div class="fade">
    <p class="section-label" data-tr="Klinik Uygulama" data-en="Clinical Practice"></p>
    <p class="bio" data-tr="Obezite, metabolik sendrom, diyabet, tiroid hastalıkları ve koruyucu hekimlik alanlarında uzmanlaşmış bir iç hastalıkları uzmanı olarak görev yapıyorum. Klinik pratiğim; kanıta dayalı tanı yaklaşımları, çoklu hastalığı olan (multimorbid) bireylerin koordinasyonu ve ancak her hastayla kurulan derin bir etkileşimden doğabilecek örüntü tanıma becerisi üzerine şekilleniyor. Günlük rutinimdeki temel odak noktam, karmaşık klinik tabloları net, düzenli ve yapılandırılmış bir düzlemde yönetmektir." data-en="I practice as an internal medicine specialist with a focus on obesity, metabolic syndrome, diabetes, thyroid disorders, and preventive health. My clinical work is shaped by evidence-based diagnostic approaches, coordination of multimorbid individuals, and the kind of pattern recognition that can only emerge from deep engagement with each patient. My primary focus in daily practice is managing complex clinical presentations in a clear, organized, and structured manner."></p>
  </div>

  <div class="rule fade"></div>

  <div class="fade">
    <p class="section-label" data-tr="Bilimsel Mimari" data-en="Scientific Architecture"></p>
    <p class="bio" data-tr="Kliniğin ötesinde, tıbbi kanıtların sentezlenme biçimini yeniden kurgulayan analitik bir altyapı inşa ediyorum. Sistematik derlemeler, meta-analizler ve metabolik tıp alanında yeniden üretilebilir iş akışları geliştirerek, bilimsel bilginin görünmez mimarisini daha şeffaf ve hataya karşı dayanıklı hale getirmeyi amaçlıyorum. Bu sistem, literatürdeki mevcut verileri doğru bir şekilde bir araya getirip bilimsel süreçte yapısal bir özen (due diligence) sağlamak üzere tasarlandı." data-en="Beyond the clinic, I'm building an analytical infrastructure that reimagines how medical evidence is synthesized. By developing systematic reviews, meta-analyses, and reproducible workflows in metabolic medicine, I aim to make the invisible architecture of scientific knowledge more transparent and resilient to error. This system is designed to accurately aggregate existing data in the literature and ensure structural due diligence in the scientific process."></p>
  </div>

  <div class="rule fade"></div>

  <div class="fade">
    <p class="section-label" data-tr="Sentez" data-en="Synthesis"></p>
    <p class="bio" data-tr="Çalışmalarımın özü, klinik sezginin hesaplamalı titizlikle buluştuğu o kesişim noktasında yer alıyor. Çünkü inşa ettiğimiz algoritmik sistemlerin ve oluşturduğumuz standartların, tıbbi pratiğe duyduğumuz saygıyı ve sahip olduğumuz temel değerleri yansıtması gerektiğine inanıyorum." data-en="The essence of my work lies at the intersection where clinical intuition meets computational rigor. Because I believe the algorithmic systems we build and the standards we establish must reflect our respect for medical practice and the core values we hold."></p>
  </div>

  <div class="rule fade"></div>

  <div class="fade">
    <p class="section-label" data-tr="Araştırma Odağı" data-en="Research Focus"></p>
    <p class="research-statement" data-tr="Rutin klinik verileri kullanarak, dahiliyecinin karar verme kapasitesini artıran tanısal ve prognostik araçlar geliştirmek." data-en="Developing diagnostic and prognostic tools that enhance the generalist's decision-making capacity using routine clinical data."></p>
    <div class="focus-areas">
      <span class="tag" data-tr="Kanıt Sentezi" data-en="Evidence Synthesis"></span>
      <span class="tag" data-tr="Metabolik Tıp" data-en="Metabolic Medicine"></span>
      <span class="tag" data-tr="Vücut Kompozisyonu" data-en="Body Composition"></span>
      <span class="tag" data-tr="Tanısal Karar Destek" data-en="Diagnostic Decision Support"></span>
      <span class="tag" data-tr="GLP-1 Reseptör Agonistleri" data-en="GLP-1 Receptor Agonists"></span>
      <span class="tag" data-tr="Vitamin D / PTH Aksı" data-en="Vitamin D / PTH Axis"></span>
    </div>

</div>

<script>
function setLang(lang) {
  document.querySelectorAll('[data-tr]').forEach(el => {
    el.textContent = el.getAttribute('data-' + lang);
  });
  document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.documentElement.lang = lang === 'tr' ? 'tr' : 'en';
  try { localStorage.setItem('lang', lang); } catch(e) {}
}
try {
  const saved = localStorage.getItem('lang');
  if (saved === 'en') setLang('en');
} catch(e) {}
</script>
